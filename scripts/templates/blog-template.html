<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | Alpaca Integrations</title>
    <meta name="description" content="{{DESCRIPTION}}">
    <link rel="canonical" href="https://alpacaintegrations.ai/blog/{{SLUG}}">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <meta property="og:title" content="{{TITLE}}">
    <meta property="og:description" content="{{DESCRIPTION}}">
    <meta property="og:image" content="https://alpacaintegrations.ai/images/og/{{OG_IMAGE}}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://alpacaintegrations.ai/blog/{{SLUG}}">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{TITLE}}">
    <meta name="twitter:description" content="{{DESCRIPTION}}">
    <meta name="twitter:image" content="https://alpacaintegrations.ai/images/og/{{OG_IMAGE}}">

    {{SCHEMA_JSONLD}}

    <style>
        :root {
            --dark-bg: #0f0f23;
            --darker-bg: #0a0a16;
            --primary-blue: #3b82f6;
            --light-blue: #60a5fa;
            --purple: #a855f7;
            --pink: #ec4899;
            --text-light: #e2e8f0;
            --text-white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--dark-bg);
            color: var(--text-light);
            min-height: 100vh;
            line-height: 1.7;
        }
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(15, 15, 35, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(168, 85, 247, 0.2);
        }
        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav a.logo {
            display: flex;
            align-items: center;
        }
        nav a.logo img {
            height: 32px;
            width: auto;
            display: block;
        }
        nav a.book {
            color: var(--light-blue);
            text-decoration: none;
            font-size: 0.95rem;
        }
        @media (max-width: 600px) {
            nav a.logo img { height: 26px; }
        }
        .blog-article {
            max-width: 760px;
            margin: 6rem auto 4rem;
            padding: 0 1.5rem;
        }
        .blog-meta {
            color: rgba(226, 232, 240, 0.6);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .blog-article h1 {
            color: var(--text-white);
            font-size: 2.5rem;
            line-height: 1.2;
            margin-bottom: 1rem;
        }
        .blog-article h2 {
            color: var(--text-white);
            font-size: 1.8rem;
            margin: 2.5rem 0 1rem;
        }
        .blog-article h3 {
            color: var(--text-white);
            font-size: 1.3rem;
            margin: 2rem 0 0.75rem;
        }
        .blog-article p { margin-bottom: 1.2rem; }
        .blog-article ul, .blog-article ol {
            margin: 0 0 1.2rem 1.5rem;
        }
        .blog-article li { margin-bottom: 0.4rem; }
        .blog-article a {
            color: var(--light-blue);
            text-decoration: underline;
        }
        .blog-article a[href="#chatbot"] {
            color: var(--pink);
            font-weight: 600;
        }
        .blog-article table {
            border-collapse: collapse;
            width: 100%;
            margin: 1.5rem 0;
        }
        .blog-article th, .blog-article td {
            border: 1px solid rgba(168, 85, 247, 0.2);
            padding: 0.6rem 0.8rem;
            text-align: left;
        }
        .blog-article th {
            background: rgba(168, 85, 247, 0.1);
            color: var(--text-white);
        }
        .blog-article strong { color: var(--text-white); }
        .blog-article blockquote {
            border-left: 3px solid var(--primary-blue);
            padding-left: 1rem;
            margin: 1.5rem 0;
            color: rgba(226, 232, 240, 0.8);
            font-style: italic;
        }
        .blog-article iframe {
            display: block;
            width: 100%;
            min-height: 480px;
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 8px;
            margin: 1.5rem 0;
        }
        .video-placeholder {
            background: var(--darker-bg);
            border: 1px dashed rgba(168, 85, 247, 0.3);
            border-radius: 8px;
            padding: 3rem 1rem;
            text-align: center;
            color: rgba(226, 232, 240, 0.5);
            margin: 1.5rem 0;
        }
        .author-bio {
            max-width: 760px;
            margin: 3rem auto;
            padding: 2rem 1.5rem;
            display: flex;
            gap: 1.5rem;
            align-items: center;
            border-top: 1px solid rgba(168, 85, 247, 0.2);
            border-bottom: 1px solid rgba(168, 85, 247, 0.2);
        }
        .author-bio img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center 30%;
        }
        .author-bio strong { color: var(--text-white); }
        .author-bio a {
            color: var(--light-blue);
            text-decoration: none;
        }
        .author-bio a.company-link {
            color: var(--pink);
            font-weight: 600;
        }
        footer {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
            color: rgba(226, 232, 240, 0.5);
            font-size: 0.9rem;
        }
        footer a {
            color: var(--light-blue);
            text-decoration: none;
        }
        @media (max-width: 600px) {
            .blog-article h1 { font-size: 1.8rem; }
            .blog-article h2 { font-size: 1.4rem; }
            .author-bio { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo" aria-label="Alpaca Integrations home"><img src="/images/tekst_logo_wit.png" alt="Alpaca Integrations"></a>
            <a href="https://outlook.office365.com/book/Alpacaintegrations1@alpacaintegrations.ai/" target="_blank" rel="noopener" class="book">Plan een gesprek</a>
        </nav>
    </header>

    <article class="blog-article">
        <h1>{{TITLE}}</h1>
        <div class="blog-meta">
            Door Rick &middot; <time datetime="{{DATE_ISO}}">{{DATE_DISPLAY}}</time>
        </div>
        {{BODY_HTML}}
    </article>

    <aside class="author-bio">
        <img src="/images/rick-avatar.png" alt="Rick van Alpaca Integrations">
        <div>
            <p><strong>Rick</strong> &mdash; <a href="https://www.alpacaintegrations.ai" class="company-link">Alpaca Integrations</a></p>
            <p>Helpt MKB-bedrijven met automatisering en AI-implementatie.</p>
            <a href="https://www.youtube.com/@AlpacaRick" target="_blank" rel="noopener">YouTube kanaal &rarr;</a>
        </div>
    </aside>

    <footer>
        <p>&copy; Alpaca Integrations &middot; <a href="mailto:letstalk@alpacaintegrations.ai">letstalk@alpacaintegrations.ai</a></p>
    </footer>

    <!-- chatbot widget snippet komt hier in sub-project 2 -->
</body>
</html>
